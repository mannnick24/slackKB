# Local defaults aligned with api/src/config.ts when env vars are unset:
#   PG_CONNECTION_STRING=postgres://admin:supersecurepassword@localhost:5432/aic-db
#   EMBEDDING_HOST=http://localhost:9012/embed   (maps skb-nomic-embed 8000 -> host 9012)
#
# App images (build from repo root): npm run image  →  slackkb-api:latest, slackkb-web:latest
#
# api service: bind-mounts ./.env (this directory = api/, i.e. api/.env) to /app/.env; Node loads it via
# --env-file. Values under api.environment below override the file (e.g. in-cluster Postgres / embedding URLs).
services:
  skb-postgres:
    image: pgvector/pgvector:pg16   # PostgreSQL 16 with pgvector preinstalled
    container_name: skb-pgvector-local
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: aic-db

    ports:
      - "5432:5432"

    volumes:
      # Where PostgreSQL stores its data locally
      - pgdata:/var/lib/postgresql/data
      
      # Optional: run SQL scripts at startup (migrations, CREATE EXTENSION, etc.)
      - ./init:/docker-entrypoint-initdb.d

  skb-nomic-embed:
    build: ./packages/nomic-embed
    image: nomic-embed:latest
    container_name: skb-nomic-embed
    # Make sure the app listens on 0.0.0.0:8000 in the container
    command: >
      sh -c 'python -c "import sys; print(sys.version)" &&
             uvicorn server:app --host 0.0.0.0 --port 8000'
    environment:
      # Optional, but helps avoid tzdata/apt prompts if you build inside
      - PYTHONUNBUFFERED=1
      - PIP_NO_CACHE_DIR=1
    ports:
      - "9012:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/docs"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  api:
    image: slackkb-api:latest
    container_name: skb-api
    restart: unless-stopped
    depends_on:
      - skb-postgres
      - skb-nomic-embed
    # Lets LLM_BASE_URL use host.docker.internal (e.g. Ollama on the host) on Linux too
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      # Default: api/.env when `docker compose` is run from the api/ directory
      - ./.env:/app/.env:ro
    environment:
      NODE_ENV: production
      PORT: "3001"
      PG_CONNECTION_STRING: postgres://admin:supersecurepassword@skb-postgres:5432/aic-db
      # In-cluster embedding service (container port 8000, not host 9012)
      EMBEDDING_HOST: http://skb-nomic-embed:8000/embed
      # APP_ENC_KEY_B64, LLM_*, etc. come from the mounted .env; entries here override the file.

  web:
    image: slackkb-web:latest
    container_name: skb-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx.web.compose.conf:/etc/nginx/conf.d/default.conf:ro

    # OLD
